version: '3.9'

services:
  scraps-db:
    image: docker.io/mujo/pocketbase:latest
    container_name: scraps-db
    command: ["/pb/pocketbase", "serve", "--http=0.0.0.0:8090", "--dir=/pb_data"]
    volumes:
      - ./pb_data:/pb_data:Z
      - ./pb_migrations:/pb/pb_migrations:Z
    restart: unless-stopped

  scraps-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    container_name: scraps-ui
    depends_on:
      - scraps-db
    restart: unless-stopped

  scraps-notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    container_name: scraps-notifier
    depends_on:
      - scraps-db
    environment:
      PB_URL: http://scraps-db:8090
      CHECK_INTERVAL_HOURS: 2
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-}
    restart: unless-stopped

  scraps-tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: scraps-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - scraps-ui
    restart: unless-stopped
