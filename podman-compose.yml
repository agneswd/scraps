version: '3.9'

services:
  scraps-db:
    image: docker.io/lukehagar/pocketbase:latest
    container_name: scraps-db
    entrypoint: /pb/pocketbase
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data", "--migrationsDir=/pb_migrations"]
    environment:
      - PB_DATA_DIR=/pb_data
    volumes:
      - ./pb_data:/pb_data:Z
      - ./pb_migrations:/pb_migrations:Z
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  scraps-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
        VITE_GEMINI_KEY: ${VITE_GEMINI_KEY:-}
        VITE_SPOONACULAR_KEY: ${VITE_SPOONACULAR_KEY:-}
    container_name: scraps-ui
    ports:
      - "8080:80"
    depends_on:
      scraps-db:
        condition: service_healthy
    restart: unless-stopped

  scraps-notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    container_name: scraps-notifier
    depends_on:
      scraps-db:
        condition: service_healthy
    environment:
      PB_URL: http://scraps-db:8090
      CHECK_INTERVAL_HOURS: 2
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-}
    restart: unless-stopped

  scraps-tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: scraps-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - scraps-ui
    profiles:
      - tunnel
    restart: unless-stopped
