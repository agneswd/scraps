server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # PocketBase API proxy — proxy_buffering off is critical for SSE real-time subscriptions
  location /api/ {
    proxy_pass http://scraps-db:8090/api/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # PocketBase admin panel
  location /_/ {
    proxy_pass http://scraps-db:8090/_/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hashed assets — immutable long cache
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Service worker, manifest, index — never cache
  location ~* ^/(sw\.js|manifest\.json|index\.html)$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}

