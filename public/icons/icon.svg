<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title>Scraps</title>
  <!-- Green background square (1:1) -->
  <rect width="256" height="256" fill="#2d6a4f"/>

  <!-- Bowl body: open half-circle curve -->
  <path d="M 44 130
    Q 44 196 128 196
    Q 212 196 212 130
    Z"
    fill="none" stroke="white" stroke-width="11" stroke-linejoin="round"/>

  <!-- Bowl rim / top ellipse arc -->
  <path d="M 44 130 Q 86 112 128 112 Q 170 112 212 130"
    fill="none" stroke="white" stroke-width="11" stroke-linecap="round"/>

  <!-- Bowl base stand -->
  <path d="M 98 196 Q 128 208 158 196"
    fill="none" stroke="white" stroke-width="11" stroke-linecap="round"/>

  <!-- Middle leaf / tall center sprig -->
  <path d="M 128 112
    C 128 90 118 68 128 50
    C 138 68 128 90 128 112"
    fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center vein -->
  <line x1="128" y1="108" x2="128" y2="56" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M 112 108
    C 102 88 84 76 86 58
    C 102 64 112 84 112 108"
    fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left vein -->
  <line x1="111" y1="104" x2="88" y2="62" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Right leaf -->
  <path d="M 144 108
    C 154 88 172 76 170 58
    C 154 64 144 84 144 108"
    fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right vein -->
  <line x1="145" y1="104" x2="168" y2="62" stroke="white" stroke-width="6" stroke-linecap="round"/>
</svg>
